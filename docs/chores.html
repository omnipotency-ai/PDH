<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chore Roulette: 2-Hour Frenzy</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s;
        }
        h1 { color: #ff8c00; font-size: 2em; }
        #task-container {
            background: #2a2a2a;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }
        #task-name {
            font-size: 2.5em;
            color: #4CAF50;
            margin: 20px 0;
            font-weight: bold;
        }
        #timer {
            font-size: 6em;
            font-family: monospace;
            color: #ff8c00;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
        }
        .btn {
            background-color: #ff8c00;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            margin: 10px;
        }
        .btn:hover { background-color: #e67e00; }
        .btn-done { background-color: #4CAF50; display: none; }
        .btn-done:hover { background-color: #45a049; }
        
        #progress { margin-top: 20px; font-size: 1.2em; color: #aaa; }

        /* Explosion Animation */
        @keyframes explode {
            0% { background-color: #ff0000; transform: translate(5px, 5px); }
            10% { background-color: #1e1e1e; transform: translate(-5px, -5px); }
            20% { background-color: #ff0000; transform: translate(-5px, 5px); }
            30% { background-color: #1e1e1e; transform: translate(5px, -5px); }
            40% { background-color: #ff0000; }
            100% { background-color: #8b0000; }
        }
        .exploded { animation: explode 0.5s ease-in-out; background-color: #8b0000 !important; }
        
        /* Hide stuff initially */
        #game-ui { display: none; }
    </style>
</head>
<body>

    <div id="intro-ui">
        <h1>🏠 2-Hour Chore Roulette</h1>
        <p>Your tasks are randomized. The time you get is randomized.</p>
        <p>When the timer explodes, you must move to the next task!</p>
        <p><i>(Coding is excluded for your dedicated session later tonight).</i></p>
        <button class="btn" onclick="startGame()">Start Chore Roulette</button>
    </div>

    <div id="game-ui">
        <div id="task-container">
            <div id="task-label">YOUR CURRENT TASK:</div>
            <div id="task-name">Loading...</div>
            <div id="timer">00:00</div>
            <button id="btn-done" class="btn btn-done" onclick="finishTaskEarly()">Finished Early! Next Task</button>
            <button id="btn-next" class="btn" style="display: none;" onclick="nextTask()">Timer Exploded! Next Task</button>
        </div>
        <div id="progress">Tasks remaining: <span id="tasks-left"></span></div>
    </div>

    <script>
        // Array of tasks with specific min/max minute boundaries based on your prompt
        let tasks =[
            { name: "Shower & Wash", min: 3, max: 6 },
            { name: "Shave", min: 3, max: 5 },
            { name: "Cura (Dress wound)", min: 3, max: 6 },
            { name: "Dye Beard", min: 12, max: 15 }, // Rule: At least 10-15 mins
            { name: "Empty bin & bring rubbish downstairs", min: 10, max: 13 }, // Rule: At least 10 mins
            { name: "Fill dishwasher & put it on", min: 3, max: 6 },
            { name: "Wipe down & dry kitchen counters", min: 2, max: 5 },
            { name: "Sort out cupboards & put away", min: 4, max: 8 },
            { name: "Clean the mirrors", min: 2, max: 5 },
            { name: "Make the bed", min: 1, max: 4 },
            { name: "Dress sofa blanket nicely", min: 1, max: 3 },
            { name: "Sweep & mop floors", min: 8, max: 15 },
            { name: "Sweep & mop bathroom", min: 5, max: 8 },
            { name: "Draw the curtains", min: 1, max: 2 },
            { name: "Fill the washing machine", min: 3, max: 6 },
            { name: "Sew sofa bed for Sophia the cat", min: 20, max: 25 }, // Rule: Not less than 20 mins
            { name: "Water the plants", min: 3, max: 6 },
            { name: "Change water for flowers", min: 2, max: 5 }
        ];

        let currentInterval;
        let timeRemaining = 0;
        let totalTasks = tasks.length;
        let audioCtx;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Generate an annoying beep for the "Explosion"
        function playAlarm() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); // Beep
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime + 0.2); // Boop
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
        }

        function startGame() {
            // Initialize audio context on first user gesture
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            document.getElementById('intro-ui').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            shuffle(tasks); // Randomize the order
            loadNextTask();
        }

        function loadNextTask() {
            document.body.classList.remove('exploded');
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('btn-done').style.display = 'inline-block';
            document.getElementById('timer').style.color = '#ff8c00';

            if (tasks.length === 0) {
                document.getElementById('task-name').innerText = "🎉 ALL DONE! 🎉";
                document.getElementById('timer').innerText = "00:00";
                document.getElementById('btn-done').style.display = 'none';
                document.getElementById('task-label').innerText = "Congratulations! Now go code.";
                document.getElementById('tasks-left').innerText = "0";
                return;
            }

            // Pop a task from the randomized array
            let task = tasks.pop();
            document.getElementById('tasks-left').innerText = tasks.length + 1;
            document.getElementById('task-name').innerText = task.name;

            // Calculate random time based on min/max constraints
            let minutes = Math.floor(Math.random() * (task.max - task.min + 1)) + task.min;
            timeRemaining = minutes * 60; 

            updateDisplay();
            
            clearInterval(currentInterval);
            currentInterval = setInterval(countdown, 1000);
        }

        function countdown() {
            timeRemaining--;
            updateDisplay();

            if (timeRemaining <= 0) {
                explode();
            } else if (timeRemaining <= 60) {
                // Flash timer red when under 1 minute
                document.getElementById('timer').style.color = timeRemaining % 2 === 0 ? 'red' : '#ff8c00';
            }
        }

        function updateDisplay() {
            let mins = Math.floor(timeRemaining / 60);
            let secs = timeRemaining % 60;
            document.getElementById('timer').innerText = 
                (mins < 10 ? "0" : "") + mins + ":" + (secs < 10 ? "0" : "") + secs;
        }

        function explode() {
            clearInterval(currentInterval);
            document.getElementById('timer').innerText = "BOOM!";
            document.getElementById('timer').style.color = "red";
            document.body.classList.add('exploded');
            playAlarm();
            
            // Swap buttons
            document.getElementById('btn-done').style.display = 'none';
            document.getElementById('btn-next').style.display = 'inline-block';
        }

        function finishTaskEarly() {
            clearInterval(currentInterval);
            loadNextTask();
        }

        function nextTask() {
            loadNextTask();
        }
    </script>
</body>
</html>
